name: release-main

on:
  release:
    types: [published]

jobs:

  set-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Export tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT
        if: ${{ github.event_name == 'release' }}

      - name: Normalize release version
        id: version
        run: |
          release_version="${{ steps.vars.outputs.tag }}"
          release_version="${release_version#v}"
          echo "release_version=$release_version" >> $GITHUB_OUTPUT
        if: ${{ github.event_name == 'release' }}

      - name: Update project version
        run: |
          sed -i "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" pyproject.toml
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        if: ${{ github.event_name == 'release' }}

      - name: Validate pyproject version matches release version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          release_version = "${{ steps.version.outputs.release_version }}"
          content = Path("pyproject.toml").read_text()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              raise SystemExit("pyproject.toml does not contain a version field")
          version = match.group(1)
          if version != release_version:
              raise SystemExit(f"Release version {release_version} does not match pyproject.toml version {version}")
          print(f"pyproject.toml version {version} matches release version {release_version}")
          PY
        if: ${{ github.event_name == 'release' }}

      - name: Upload updated pyproject.toml
        uses: actions/upload-artifact@v7
        with:
          name: pyproject-toml
          path: pyproject.toml

  publish:
    runs-on: ubuntu-latest
    needs: [set-version]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Download updated pyproject.toml
        uses: actions/download-artifact@v7
        with:
          name: pyproject-toml

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  deploy-docs:
    needs: publish
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build documentation
        run: uv run mkdocs build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
